<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加新图书</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #FFE4E1 0%, #F0F8FF 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            padding: 40px;
            margin-top: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .form-section {
            background-color: #FFF0F5;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .form-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,182,193,0.3);
        }
        .existing-books {
            background-color: #E6E6FA;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
        }
        .book-item {
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,182,193,0.2);
        }
        .book-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(255,182,193,0.2);
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #E6E6FA;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #FFB6C1;
            box-shadow: 0 0 0 0.2rem rgba(255,182,193,0.25);
        }
        .btn-custom {
            background-color: #FFB6C1;
            color: #4A4A4A;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            padding: 10px 25px;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #FFC0CB;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,182,193,0.4);
            color: #4A4A4A;
        }
        .input-hint {
            color: #778899;
            font-size: 0.9rem;
            margin-top: 5px;
            padding: 8px 12px;
            background-color: #F0FFFF;
            border-radius: 8px;
            border-left: 3px solid #FFB6C1;
        }
        h2, h3, h4 {
            color: #5F9EA0;
            margin-bottom: 20px;
        }
        .alert-success {
            background-color: #E0FFF0;
            border-color: #98FB98;
            color: #3CB371;
            border-radius: 12px;
        }
        .alert-danger {
            background-color: #FFE4E1;
            border-color: #FFB6C1;
            color: #FF69B4;
            border-radius: 12px;
        }
        .search-box {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="text-center mb-4">添加新图书</h2>
        
        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div class="alert alert-success" role="alert">
            <i class="fas fa-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <!-- 现有图书列表 -->
        <div class="existing-books">
            <h4><i class="fas fa-books"></i> 现有图书列表</h4>
            <div class="search-box">
                <input type="text" class="form-control" id="searchBook" placeholder="搜索图书..." 
                       onkeyup="searchBooks()">
            </div>
            <div id="bookList">
                {% for book in existing_books %}
                <div class="book-item">
                    <h5><i class="fas fa-book"></i> {{ book[1] }}</h5>
                    <p class="mb-0">
                        <strong>作者：</strong>{{ book[4] }} {{ book[3] }} | 
                        <strong>类型：</strong>{{ book[2] }} | 
                        <strong>出版社：</strong>{{ book[6] }}
                    </p>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- 添加新图书表单 -->
        <div class="form-section">
            <h4><i class="fas fa-plus-circle"></i> 添加新图书</h4>
            <form method="POST">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="book_id">图书ID</label>
                            <input type="text" class="form-control" id="book_id" name="book_id" required>
                            <div class="input-hint">
                                <i class="fas fa-info-circle"></i> 请输入唯一的图书标识号
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="title">书名</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                            <div class="input-hint">
                                <i class="fas fa-info-circle"></i> 请确保书名不重复
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="type">类型</label>
                            <input type="text" class="form-control" id="type" name="type" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="author_fname">作者名</label>
                            <input type="text" class="form-control" id="author_fname" name="author_fname" required>
                        </div>
                        <div class="form-group">
                            <label for="author_lname">作者姓</label>
                            <input type="text" class="form-control" id="author_lname" name="author_lname" required>
                        </div>
                        <div class="form-group">
                            <label for="publisher_id">出版社ID</label>
                            <input type="text" class="form-control" id="publisher_id" name="publisher_id" required>
                        </div>
                        <div class="form-group">
                            <label for="publisher">出版社名称</label>
                            <input type="text" class="form-control" id="publisher" name="publisher" required>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-custom">
                        <i class="fas fa-plus"></i> 添加图书
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-secondary">
                        <i class="fas fa-home"></i> 返回首页
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function searchBooks() {
            var input = document.getElementById('searchBook');
            var filter = input.value.toLowerCase();
            var bookItems = document.getElementsByClassName('book-item');

            for (var i = 0; i < bookItems.length; i++) {
                var bookName = bookItems[i].getElementsByTagName('h5')[0].textContent;
                if (bookName.toLowerCase().indexOf(filter) > -1) {
                    bookItems[i].style.display = '';
                } else {
                    bookItems[i].style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
